<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業日報 マスター管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Meiryo UI","Yu Gothic UI","メイリオ",sans-serif;font-size:14px;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:14px}
h1{font-size:19px;font-weight:600;margin-bottom:2px}
.subtitle{font-size:12px;color:#888;margin-bottom:14px}
.tabs{display:flex;gap:2px;border-bottom:2px solid #ddd;margin-bottom:16px}
.tab{padding:9px 20px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;border-radius:4px 4px 0 0;font-family:inherit}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;background:#fff;font-weight:600}
.tab:hover:not(.active){background:#eee;color:#444}
.panel{display:none}.panel.active{display:block}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;margin-bottom:14px}
.section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
select,input{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:7px;background:#fff;color:#1a1a1a;outline:none}
.btn{padding:7px 16px;font-size:13px;border:1px solid #ccc;border-radius:7px;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.metrics-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.metric{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px;text-align:center}
.metric-label{font-size:11px;color:#888;margin-bottom:4px}
.metric-value{font-size:20px;font-weight:700}
.metric-unit{font-size:12px;font-weight:400}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{width:auto}
/* テーブル */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f5f5f3;padding:8px 10px;text-align:left;border-bottom:2px solid #ddd;white-space:nowrap;font-weight:600;color:#555}
td{padding:8px 10px;border-bottom:1px solid #eee;white-space:nowrap}
tr:hover td{background:#f9f9f7}
/* ランキング */
.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.progress-label{font-size:12px;width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-bar-wrap{flex:1;height:10px;background:#eee;border-radius:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:5px}
.progress-val{font-size:12px;font-weight:600;min-width:48px;text-align:right;color:#555}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
/* ローディング */
#loading{display:flex;align-items:center;justify-content:center;padding:3rem;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;color:#aaa;padding:2rem}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.b0{background:#dbeafe;color:#1e40af}.b1{background:#dcfce7;color:#166534}
.b2{background:#fef9c3;color:#854d0e}.b3{background:#ffe4e6;color:#9f1239}.b4{background:#ede9fe;color:#5b21b6}
.err-box{background:#fff0f0;border:1px solid #fcc;border-radius:8px;padding:12px 16px;color:#c00;font-size:13px;margin-bottom:12px}
/* 月次テーブル */
.month-table th:first-child,.month-table td:first-child{position:sticky;left:0;background:#f5f5f3;z-index:1}
.month-table td:first-child{background:#fff}
</style>
</head>
<body>
<div class="app">
  <h1>📊 作業日報 マスター管理</h1>
  <p class="subtitle">Googleスプレッドシートからリアルタイムで全員分のデータを取得・集計</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard',this)">📊 ダッシュボード</button>
    <button class="tab" onclick="switchTab('records',this)">📋 全記録一覧</button>
    <button class="tab" onclick="switchTab('monthly',this)">📅 月次集計</button>
    <button class="tab" onclick="switchTab('worker',this)">👤 作業者別</button>
  </div>

  <div id="err-area"></div>

  <!-- ダッシュボード -->
  <div id="panel-dashboard" class="panel active">
    <div class="filter-bar">
      <input type="month" id="dash-month" onchange="renderDashboard()">
      <select id="dash-worker" onchange="renderDashboard()" style="min-width:130px">
        <option value="">全作業者</option>
      </select>
      <button class="btn btn-primary" onclick="loadData()">🔄 最新データを取得</button>
      <span id="last-updated" style="font-size:12px;color:#888"></span>
    </div>
    <div id="loading" style="display:none"><div class="spinner"></div><span style="font-size:13px;color:#888">データを取得中...</span></div>
    <div id="dash-metrics" class="metrics-grid"></div>
    <div class="grid2" style="margin-bottom:14px">
      <div class="card"><div class="section-title">作業品目別時間ランキング</div><div id="dash-items"></div></div>
      <div class="card"><div class="section-title">作業内容別時間ランキング</div><div id="dash-types"></div></div>
    </div>
    <div class="card">
      <div class="section-title">作業者別稼働時間</div>
      <div id="dash-workers"></div>
    </div>
  </div>

  <!-- 全記録一覧 -->
  <div id="panel-records" class="panel">
    <div class="filter-bar">
      <input type="month" id="rec-month" onchange="renderRecords()">
      <select id="rec-worker" onchange="renderRecords()" style="min-width:130px">
        <option value="">全作業者</option>
      </select>
      <select id="rec-item" onchange="renderRecords()" style="min-width:130px">
        <option value="">全作業品目</option>
      </select>
      <select id="rec-type" onchange="renderRecords()" style="min-width:120px">
        <option value="">全作業内容</option>
      </select>
      <span id="rec-count" style="font-size:12px;color:#888"></span>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table id="rec-table">
          <thead><tr>
            <th>日付</th><th>作業者</th><th>業務開始</th><th>業務終了</th>
            <th>業務時間(h)</th><th>作業時間(h)</th><th>作業品目</th><th>作業内容</th>
            <th>開始</th><th>終了</th><th>時間(h)</th>
          </tr></thead>
          <tbody id="rec-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 月次集計 -->
  <div id="panel-monthly" class="panel">
    <div class="filter-bar">
      <select id="mon-worker" onchange="renderMonthly()" style="min-width:130px">
        <option value="">全作業者</option>
      </select>
    </div>
    <div class="card">
      <div class="section-title">月別・作業者別 稼働時間サマリー</div>
      <div class="tbl-wrap">
        <table id="monthly-table" class="month-table">
          <thead id="monthly-head"></thead>
          <tbody id="monthly-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 作業者別 -->
  <div id="panel-worker" class="panel">
    <div class="filter-bar">
      <input type="month" id="wk-month" onchange="renderWorker()">
      <select id="wk-worker" onchange="renderWorker()" style="min-width:130px">
        <option value="">-- 選択 --</option>
      </select>
    </div>
    <div id="worker-detail"></div>
  </div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwrfpS1VQYwUJUOu4d-2ZqcNork4RhfljRToJ6EuafRIkmhDBaqht9Mx5kvKWcCuQAU/exec';
const BAR_COLORS=['#2563eb','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#65a30d','#db2777','#b45309','#4f46e5'];
const WORKERS=['高野　豊','平間　茂','平間　弦','丹野　博文','草苅　忠','石倉　明音','東　一樹','岡崎　直人','平間　涼晴','小野寺　蒼生'];

let allRows=[];

// 作業者セレクトを全部埋める
function fillWorkerSelects(){
  ['dash-worker','rec-worker','wk-worker','mon-worker'].forEach(id=>{
    const sel=document.getElementById(id);
    const cur=sel.value;
    while(sel.options.length>1) sel.remove(1);
    WORKERS.forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent=w;sel.appendChild(o);});
    sel.value=cur;
  });
}

async function loadData(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('err-area').innerHTML='';
  try{
    const res=await fetch(GAS_URL+'?t='+Date.now());
    const json=await res.json();
    if(json.status!=='ok') throw new Error(json.message||'取得エラー');
    allRows=json.data||[];
    // 品目・内容セレクト埋め
    const items=[...new Set(allRows.map(r=>r['作業品目']).filter(Boolean))].sort();
    const types=[...new Set(allRows.map(r=>r['作業内容']).filter(Boolean))].sort();
    const iSel=document.getElementById('rec-item');
    while(iSel.options.length>1) iSel.remove(1);
    items.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;iSel.appendChild(o);});
    const tSel=document.getElementById('rec-type');
    while(tSel.options.length>1) tSel.remove(1);
    types.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;tSel.appendChild(o);});
    document.getElementById('last-updated').textContent='最終取得：'+new Date().toLocaleString('ja-JP');
    document.getElementById('loading').style.display='none';
    renderAll();
  }catch(err){
    document.getElementById('loading').style.display='none';
    document.getElementById('err-area').innerHTML=`<div class="err-box">⚠ データの取得に失敗しました。Wi-Fi接続を確認してください。<br>詳細：${err.message}</div>`;
  }
}

function filterRows(rows, month, worker){
  return rows.filter(r=>{
    const d=String(r['日付']||'').substring(0,7);
    if(month&&d!==month) return false;
    if(worker&&r['作業者']!==worker) return false;
    return true;
  });
}

function renderAll(){
  renderDashboard();
  renderRecords();
  renderMonthly();
  renderWorker();
}

function renderDashboard(){
  const month=document.getElementById('dash-month').value;
  const worker=document.getElementById('dash-worker').value;
  const fl=filterRows(allRows,month,worker);
  // ユニーク日報数（記録ID+日付で集計）
  const daySet=new Set(fl.map(r=>r['作業者']+'_'+r['日付']));
  const workerSet=new Set(fl.map(r=>r['作業者']));
  const totalH=fl.reduce((s,r)=>s+parseFloat(r['作業時間(h)']||0),0);
  const avgH=daySet.size>0?(totalH/daySet.size).toFixed(2):0;
  // 業務時間（重複排除）
  const bizSet={};
  fl.forEach(r=>{const k=r['作業者']+'_'+r['日付'];if(!bizSet[k])bizSet[k]=parseFloat(r['業務時間(h)']||0);});
  const totalBiz=Object.values(bizSet).reduce((s,v)=>s+v,0);
  document.getElementById('dash-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">作業時間合計</div><div class="metric-value">${totalH.toFixed(1)}<span class="metric-unit"> h</span></div></div>
    <div class="metric"><div class="metric-label">業務時間合計</div><div class="metric-value">${totalBiz.toFixed(1)}<span class="metric-unit"> h</span></div></div>
    <div class="metric"><div class="metric-label">記録件数</div><div class="metric-value">${fl.length}<span class="metric-unit"> 件</span></div></div>
    <div class="metric"><div class="metric-label">稼働日数</div><div class="metric-value">${daySet.size}<span class="metric-unit"> 日</span></div></div>
    <div class="metric"><div class="metric-label">1日平均作業</div><div class="metric-value">${avgH}<span class="metric-unit"> h</span></div></div>`;
  function rank(map,cid){
    const s=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    const mx=s[0]?s[0][1]:1;
    document.getElementById(cid).innerHTML=s.length?s.slice(0,10).map((e,i)=>`
      <div class="progress-row">
        <div class="progress-label" title="${e[0]}">${i+1}. ${e[0]}</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${(e[1]/mx*100).toFixed(1)}%;background:${BAR_COLORS[i%10]}"></div></div>
        <div class="progress-val">${e[1].toFixed(2)}h</div>
      </div>`).join(''):'<div class="empty">データなし</div>';
  }
  const im={},tm={};
  fl.forEach(r=>{
    const h=parseFloat(r['作業時間(h)']||0);
    if(r['作業品目']) im[r['作業品目']]=(im[r['作業品目']]||0)+h;
    if(r['作業内容']) tm[r['作業内容']]=(tm[r['作業内容']]||0)+h;
  });
  rank(im,'dash-items'); rank(tm,'dash-types');
  const wm={};
  fl.forEach(r=>{const h=parseFloat(r['作業時間(h)']||0);if(r['作業者'])wm[r['作業者']]=(wm[r['作業者']]||0)+h;});
  const ws=Object.entries(wm).sort((a,b)=>b[1]-a[1]);
  const wmx=ws[0]?ws[0][1]:1;
  document.getElementById('dash-workers').innerHTML=ws.length?ws.map((e,i)=>`
    <div class="progress-row">
      <div class="progress-label">${e[0]}</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${(e[1]/wmx*100).toFixed(1)}%;background:${BAR_COLORS[i%10]}"></div></div>
      <div class="progress-val">${e[1].toFixed(2)}h</div>
    </div>`).join(''):'<div class="empty">データなし</div>';
}

function renderRecords(){
  const month=document.getElementById('rec-month').value;
  const worker=document.getElementById('rec-worker').value;
  const item=document.getElementById('rec-item').value;
  const type=document.getElementById('rec-type').value;
  let fl=filterRows(allRows,month,worker);
  if(item) fl=fl.filter(r=>r['作業品目']===item);
  if(type) fl=fl.filter(r=>r['作業内容']===type);
  // 日付降順ソート
  fl.sort((a,b)=>{
    const da=String(a['日付']).substring(0,10);
    const db=String(b['日付']).substring(0,10);
    return db.localeCompare(da);
  });
  document.getElementById('rec-count').textContent=fl.length+'件';
  const tbody=document.getElementById('rec-body');
  if(!fl.length){tbody.innerHTML='<tr><td colspan="11" class="empty">データなし</td></tr>';return;}
  tbody.innerHTML=fl.map(r=>{
    const d=String(r['日付']||'').substring(0,10);
    return `<tr>
      <td>${d}</td>
      <td>${r['作業者']||''}</td>
      <td>${r['業務開始']||''}</td>
      <td>${r['業務終了']||''}</td>
      <td style="text-align:right">${parseFloat(r['業務時間(h)']||0).toFixed(2)}</td>
      <td style="text-align:right">${parseFloat(r['作業時間合計(h)']||0).toFixed(2)}</td>
      <td>${r['作業品目']||''}</td>
      <td>${r['作業内容']||''}</td>
      <td>${r['開始時刻']||''}</td>
      <td>${r['終了時刻']||''}</td>
      <td style="text-align:right;font-weight:600">${parseFloat(r['作業時間(h)']||0).toFixed(2)}</td>
    </tr>`;
  }).join('');
}

function renderMonthly(){
  const worker=document.getElementById('mon-worker').value;
  let fl=worker?allRows.filter(r=>r['作業者']===worker):allRows;
  // 月リスト
  const months=[...new Set(fl.map(r=>String(r['日付']||'').substring(0,7)).filter(m=>m.length===7))].sort();
  // 作業者リスト
  const workers=worker?[worker]:[...new Set(fl.map(r=>r['作業者']).filter(Boolean))].sort();
  if(!months.length){
    document.getElementById('monthly-head').innerHTML='';
    document.getElementById('monthly-body').innerHTML='<tr><td class="empty">データなし</td></tr>';
    return;
  }
  // ヘッダー
  document.getElementById('monthly-head').innerHTML=`<tr><th>作業者</th>${months.map(m=>`<th>${m}</th>`).join('')}<th>合計</th></tr>`;
  // 集計
  const map={};
  fl.forEach(r=>{
    const w=r['作業者'],m=String(r['日付']||'').substring(0,7);
    if(!w||!m) return;
    if(!map[w]) map[w]={};
    map[w][m]=(map[w][m]||0)+parseFloat(r['作業時間(h)']||0);
  });
  document.getElementById('monthly-body').innerHTML=workers.map(w=>{
    const monthTotals=months.map(m=>(map[w]&&map[w][m]||0));
    const total=monthTotals.reduce((s,v)=>s+v,0);
    return `<tr><td style="font-weight:500">${w}</td>${monthTotals.map(v=>`<td style="text-align:right">${v>0?v.toFixed(2):'-'}</td>`).join('')}<td style="text-align:right;font-weight:700">${total.toFixed(2)}</td></tr>`;
  }).join('');
}

function renderWorker(){
  const month=document.getElementById('wk-month').value;
  const worker=document.getElementById('wk-worker').value;
  const el=document.getElementById('worker-detail');
  if(!worker){el.innerHTML='<div class="card"><div class="empty">作業者を選択してください</div></div>';return;}
  const fl=filterRows(allRows,month,worker);
  if(!fl.length){el.innerHTML='<div class="card"><div class="empty">該当データなし</div></div>';return;}
  const totalH=fl.reduce((s,r)=>s+parseFloat(r['作業時間(h)']||0),0);
  const daySet=new Set(fl.map(r=>String(r['日付']||'').substring(0,10)));
  const im={},tm={};
  fl.forEach(r=>{
    const h=parseFloat(r['作業時間(h)']||0);
    if(r['作業品目']) im[r['作業品目']]=(im[r['作業品目']]||0)+h;
    if(r['作業内容']) tm[r['作業内容']]=(tm[r['作業内容']]||0)+h;
  });
  // 日別集計
  const dayMap={};
  fl.forEach(r=>{
    const d=String(r['日付']||'').substring(0,10);
    if(!dayMap[d]) dayMap[d]={biz:parseFloat(r['業務時間(h)']||0),work:0,start:r['業務開始'],end:r['業務終了']};
    dayMap[d].work+=parseFloat(r['作業時間(h)']||0);
  });
  const days=Object.entries(dayMap).sort((a,b)=>b[0].localeCompare(a[0]));
  function rankRows(map){
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,8).map((e,i)=>`
      <div class="progress-row">
        <div class="progress-label" title="${e[0]}">${i+1}. ${e[0]}</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${(e[1]/Object.values(map).reduce((s,v)=>Math.max(s,v),1)*100).toFixed(1)}%;background:${BAR_COLORS[i%10]}"></div></div>
        <div class="progress-val">${e[1].toFixed(2)}h</div>
      </div>`).join('');
  }
  el.innerHTML=`
    <div class="metrics-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="metric"><div class="metric-label">作業時間合計</div><div class="metric-value">${totalH.toFixed(1)}<span class="metric-unit"> h</span></div></div>
      <div class="metric"><div class="metric-label">稼働日数</div><div class="metric-value">${daySet.size}<span class="metric-unit"> 日</span></div></div>
      <div class="metric"><div class="metric-label">1日平均</div><div class="metric-value">${daySet.size>0?(totalH/daySet.size).toFixed(2):0}<span class="metric-unit"> h</span></div></div>
    </div>
    <div class="grid2" style="margin-bottom:14px">
      <div class="card"><div class="section-title">作業品目別</div>${rankRows(im)||'<div class="empty">データなし</div>'}</div>
      <div class="card"><div class="section-title">作業内容別</div>${rankRows(tm)||'<div class="empty">データなし</div>'}</div>
    </div>
    <div class="card">
      <div class="section-title">日別稼働一覧</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>日付</th><th>業務開始</th><th>業務終了</th><th>業務時間(h)</th><th>作業時間(h)</th></tr></thead>
          <tbody>${days.map(([d,v])=>`<tr><td>${d}</td><td>${v.start||''}</td><td>${v.end||''}</td><td style="text-align:right">${v.biz.toFixed(2)}</td><td style="text-align:right;font-weight:600">${v.work.toFixed(2)}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>`;
}

function switchTab(t,btn){
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(e=>e.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
}

// 初期化
const ym=new Date().toISOString().substring(0,7);
document.getElementById('dash-month').value=ym;
document.getElementById('rec-month').value=ym;
document.getElementById('wk-month').value=ym;
fillWorkerSelects();
loadData();
</script>
</body>
</html>
